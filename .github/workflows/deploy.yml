name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main   # runs on every push to main

permissions:
  contents: write  # needed to push to gh-pages branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: lizzyplace-react/package-lock.json

      - name: Install dependencies
        working-directory: lizzyplace-react
        run: npm ci

      - name: Build
        working-directory: lizzyplace-react
        env:
          # Pulled from: GitHub repo → Settings → Secrets and variables → Actions
          VITE_FORM_EMAIL: ${{ secrets.VITE_FORM_EMAIL }}
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: lizzyplace-react/dist
